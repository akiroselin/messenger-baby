  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #4ECDC4;
      font-family: 'Courier New', monospace;
      -webkit-font-smoothing: antialiased;
      color: #2c3e50;
    }
    body {
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
      padding: 40px 20px;
      box-sizing: border-box;
      text-align: center;
    }
    h1 {
      font-size: 32px;

    p.subtitle {

      font-size: 13px;
      opacity: 0.7;
      letter-spacing: 1px;
    }
    a.card {
      display: inline-block;
      padding: 16px 40px;
      background: #F4B942;
      color: #2c3e50;
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 2px;
      text-decoration: none;
      border: 3px solid #2c3e50;
      border-radius: 4px;
      box-shadow: 0 4px 0 #2c3e50;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    a.card:hover { background: #FFC857; }
    a.card:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #2c3e50;
    }
    footer {
      position: fixed;
      bottom: 18px;
      font-size: 11px;
      opacity: 0.6;
